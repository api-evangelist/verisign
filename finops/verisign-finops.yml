description: 'FOCUS-aligned FinOps stub for Verisign: registry operator with contractual / per-domain
  wholesale pricing rather than a public API consumption model. There is no public usage/billing API.'
sources:
  - https://www.verisign.com/en_US/domain-names/online/index.xhtml
notes: Verisign's billing surface is registrar-contract pricing per registered domain, not API consumption.
  Stub retained for catalog completeness; reconciliation deferred pending registrar-portal discovery.
billingModel:
  pricingCategory: Subscription
  billingFrequency: Annual
  billingCurrency: USD
  chargeCategories:
    - Purchase
focusColumns:
  ServiceName: Verisign Registry Services
  ServiceCategory: Internet Infrastructure
  ProviderName: Verisign
  PublisherName: VeriSign, Inc.
  InvoiceIssuerName: VeriSign, Inc.
  BillingCurrency: USD
meters:
  - name: domain_registration
    description: Wholesale per-domain-year line under the registry agreement; not an API consumption
      meter.
    unit: domain-year
    aggregation: sum
principles:
  - name: Visibility
    description: Visibility into registered domains is exposed to accredited registrars via EPP / RDAP
      and registrar portal reporting; end customers see invoice-level data only.
  - name: Allocation
    description: Allocation is per registered domain to the registrant of record via the accredited registrar.
  - name: Optimization
    description: Optimization is portfolio-management (consolidation, renewal cadence, premium-name strategy)
      rather than rate-card optimization; wholesale rates are contractual.
  - name: Accountability
    description: Accountability sits with the registrar of record for each domain, with end-of-portfolio
      ownership at the registrant.
