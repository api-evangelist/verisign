specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: VeriSign
providerId: verisign
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - DNS
  - Internet Infrastructure
  - Domain Registry
description: Verisign operates the .com / .net registry and related DNS infrastructure. End-user domain
  pricing is set by registrars (not by Verisign directly); registry-level wholesale pricing is set under
  ICANN registry agreements rather than as a public SaaS plan. Verisign does not publish self-serve developer
  plans or public per-tier API pricing.
sources:
  - https://www.verisign.com/en_US/domain-names/online/index.xhtml
notes: Verisign sells via registrars, not direct-to-consumer; registry wholesale pricing is contractual
  under the ICANN registry agreement. No developer self-serve plan is published. Reconciliation to a
  single Contact Sales / via-registrar plan.
plans:
  - id: verisign-via-registrar-or-contact
    name: Contact Sales / Via Registrar
    type: enterprise
    description: Domain registry services are obtained through accredited registrars; non-domain enterprise
      services (e.g. iDefense legacy, DNS protection) are quoted by Verisign sales. No self-serve API
      plan.
    entries:
      - label: Wholesale Registry Services
        name: registry_services
        type: subscription
        metric: domain
        limit: -1
        timeFrame: year
        geo: global
        unit: 1
        price: see ICANN registry agreement / via accredited registrar
        userMultiplied: false
    elements:
      - name: .com / .net Registry
      - name: DNSSEC
      - name: Registry Operator Services
maintainers:
